<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReferralHub</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
  
  <!-- Lenis CSS & Script for Smooth Scrolling -->
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Custom Cursor -->
  <div id="cursor-dot"></div>
  <div id="cursor"></div>

  <!-- Preloader -->
  <div id="preloader">
    <div id="preloader-count">0%</div>
    <div style="width: 200px; height: 2px; background: rgba(255,255,255,0.2); margin-top: 10px;">
      <div id="preloader-bar-fill" style="height: 100%; background: #fff; width: 0%;"></div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div id="scroll-progress" style="position: fixed; top: 0; left: 0; height: 3px; background: #7c3aed; z-index: 9999; width: 0%;"></div>

  <!-- Header -->
  <header id="nav">
    <div class="header-inner">
      <a href="#home" class="logo">Referral<strong>Hub</strong></a>
      <a href="https://t.me/topreferralhub" class="btn-primary ripple">Join Telegram</a>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section id="home" class="hero">
      <div class="hero-content">
        <h1 class="hero-title" style="opacity: 0;">
          Land your dream job through <span class="serif-italic">employee</span> referrals.
        </h1>
        <p class="hero-sub" style="opacity: 0;">Connecting professionals with genuine employee referrals.</p>
      </div>
    </section>

    <!-- Stats with Counters -->
    <section class="stats-grid container">
      <div class="glass-card stat-card">
        <h2 data-count="150" data-suffix="+">0</h2>
        <p>Companies</p>
      </div>
      <div class="glass-card stat-card">
        <h2 data-count="25000" data-suffix="+">0</h2>
        <p>Telegram Members</p>
      </div>
    </section>

    <!-- Jobs Section (Dynamic from JSON) -->
    <section id="jobs" class="container padding-y">
      <h2 class="section-title">Fresh openings, warm introductions.</h2>
      <div id="jobs-grid" class="grid-3">
        <!-- JS injects jobs here -->
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
